<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandleStick Pro | Advanced Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="terminal-layout">
    <div class="app-container">
        <!-- Vertical Expert Navigation -->
        <nav class="side-commander">
            <div class="nav-brand">CP</div>
            <div class="nav-actions">
                <div class="nav-btn active" title="Candle Chart" onclick="ChartEngine.switchType('candle', this)">
                    <i class="fa-solid fa-chart-candle"></i>
                </div>
                <div class="nav-btn" title="Line Chart" onclick="ChartEngine.switchType('line', this)">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div class="nav-btn" title="Area Chart" onclick="ChartEngine.switchType('area', this)">
                    <i class="fa-solid fa-chart-area"></i>
                </div>
            </div>
            <div class="nav-footer">
                <i class="fa-solid fa-circle-info"></i>
            </div>
        </nav>

        <!-- Main Analytics Stage -->
        <main class="chart-stage">
            <header class="chart-header">
                <div class="pair-info">
                    <h2>BTC / USDT</h2>
                    <span class="price-up">$64,230.15 (+1.45%)</span>
                </div>
                <div class="timeframe-selector">
                    <button onclick="ChartEngine.updateTimeframe('1H')">1H</button>
                    <button class="active" onclick="ChartEngine.updateTimeframe('4H')">4H</button>
                    <button onclick="ChartEngine.updateTimeframe('1D')">1D</button>
                </div>
            </header>

            <div class="canvas-wrapper">
                <div id="main-chart" class="chart-visual candle-mode">
                    <!-- Dynamic Bars Generated by JS -->
                </div>
            </div>

            <footer class="live-ticker">
                <div class="ticker-item">VOL: 1.2B</div>
                <div class="ticker-item">RSI: 62.4</div>
                <div class="ticker-item">MACD: Bullish</div>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
